# Build Kern on Ubuntu with Raylib (g2d/g3d) — same language graphics as Windows; CI runners are headless.
name: Linux Kern

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: linux-kern-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache FetchContent (Raylib under build/_deps)
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: linux-kern-fetchdeps-${{ hashFiles('CMakeLists.txt') }}

      - name: Install Raylib build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libasound2-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Configure (Release, graphics + no doc demo)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DKERN_BUILD_GAME=ON \
            -DKERN_BUILD_DOC_FRAMEWORK_DEMO=OFF

      - name: Build
        run: cmake --build build --parallel 4 --target kern kernc kern-scan kern_game kern_contract_humanize

      - name: Smoke
        run: |
          ./build/kern --version
          ./build/kern docs
          ./build/kern build
          ./build/kern --scan --registry-only
          ./build/kern graph --json tests/compile_pipeline_fixture/main.kn
          ./build/kern --allow=filesystem.read tests/coverage/test_g3d_api_surface_vnext_source.kn
          ./build/kern tests/coverage/test_system_access_30_surface.kn
          ./build/kern tests/std_v1_builtins_smoke.kn
          ./build/kern examples/basic/01_hello_world.kn

      # ubuntu-latest does not always expose `pwsh` on PATH; install PowerShell 7 from the official binary tarball.
      - name: Install PowerShell (pwsh) for coverage
        run: |
          set -eux
          curl -fsSL -o /tmp/pwsh.tgz \
            "https://github.com/PowerShell/PowerShell/releases/download/v7.4.6/powershell-7.4.6-linux-x64.tar.gz"
          sudo mkdir -p /opt/microsoft/powershell7
          sudo tar zxf /tmp/pwsh.tgz -C /opt/microsoft/powershell7
          sudo ln -sf /opt/microsoft/powershell7/pwsh /usr/local/bin/pwsh
          command -v pwsh
          pwsh --version

      # Headless runner: Raylib may load, but GLFW window tests must not run (same as release.yml).
      - name: Stable suite (contract, bytecode golden, coverage)
        env:
          KERN_COVERAGE_SKIP_GRAPHICS: "1"
        run: pwsh -NoProfile -File tests/run_stable.ps1

  # Debug build + strict warnings. Note: KERN_WERROR is temporarily OFF until the tree is -Wclean on GCC 14
  # (make often exits with code 2 when -Werror turns warnings into errors). Re-enable KERN_WERROR=ON after fixing.
  debug-werror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache FetchContent (Raylib under build-dbg/_deps)
        uses: actions/cache@v4
        with:
          path: build-dbg/_deps
          key: linux-kern-werror-fetchdeps-${{ hashFiles('CMakeLists.txt') }}

      - name: Install Raylib build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libasound2-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Configure (Debug, graphics)
        run: |
          cmake -B build-dbg -DCMAKE_BUILD_TYPE=Debug \
            -DKERN_BUILD_GAME=ON \
            -DKERN_BUILD_DOC_FRAMEWORK_DEMO=OFF \
            -DKERN_WERROR=OFF

      - name: Build
        run: cmake --build build-dbg --parallel 4 --target kern kernc kern-scan kern_game kern_contract_humanize

      # Bash path avoids needing pwsh for contract + golden only (coverage skipped with --quick).
      - name: Quick stable (contract + golden, Debug tree)
        env:
          KERN_COVERAGE_SKIP_GRAPHICS: "1"
        run: bash tests/run_stable.sh --quick --build-dir build-dbg

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install mkdocs

      - name: Build docs (strict)
        run: mkdocs build --strict

      - name: Post-process site (search markup + sitemap)
        run: python tools/postprocess_site.py
