# Build Kern on Ubuntu with Raylib (g2d/g3d) — same language graphics as Windows; CI runners are headless.
name: Linux Kern

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: linux-kern-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-powershell@v4

      - name: Cache FetchContent (Raylib under build/_deps)
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: linux-kern-fetchdeps-${{ hashFiles('CMakeLists.txt') }}

      - name: Install Raylib build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libasound2-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Configure (Release, graphics + no doc demo)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DKERN_BUILD_GAME=ON \
            -DKERN_BUILD_DOC_FRAMEWORK_DEMO=OFF

      - name: Build
        run: cmake --build build --parallel 4 --target kern kernc kern-scan kern_game kern_contract_humanize

      - name: Smoke
        run: |
          ./build/kern --version
          ./build/kern docs
          ./build/kern build
          ./build/kern --scan --registry-only
          ./build/kern tests/std_v1_builtins_smoke.kn
          ./build/kern examples/basic/01_hello_world.kn

      - name: Stable suite (contract, bytecode golden, coverage)
        run: pwsh -NoProfile -File tests/run_stable.ps1

  # GCC/Clang only: enforce -Werror on Debug builds (see KERN_WERROR in CMakeLists.txt).
  debug-werror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-powershell@v4

      - name: Cache FetchContent (Raylib under build-dbg/_deps)
        uses: actions/cache@v4
        with:
          path: build-dbg/_deps
          key: linux-kern-werror-fetchdeps-${{ hashFiles('CMakeLists.txt') }}

      - name: Install Raylib build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libasound2-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Configure (Debug, -Werror, graphics)
        run: |
          cmake -B build-dbg -DCMAKE_BUILD_TYPE=Debug \
            -DKERN_BUILD_GAME=ON \
            -DKERN_BUILD_DOC_FRAMEWORK_DEMO=OFF \
            -DKERN_WERROR=ON

      - name: Build
        run: cmake --build build-dbg --parallel 4 --target kern kernc kern-scan kern_game kern_contract_humanize

      - name: Quick stable (contract + golden, Debug tree)
        run: pwsh -NoProfile -File tests/run_stable.ps1 -BuildDir build-dbg -Quick

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install mkdocs

      - name: Build docs (strict)
        run: mkdocs build --strict

      - name: Post-process site (search markup + sitemap)
        run: python tools/postprocess_site.py
