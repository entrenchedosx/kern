# build Kern on Windows with bundled vcpkg + static Raylib; run fast .kn smoke tests.
name: Windows Kern

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: windows-kern-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    runs-on: windows-latest
    env:
      KERN_SKIP_FILE_ASSOCIATION: "1"
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cached tree must NOT live under the vcpkg clone dir, or `git clone _vcpkg` fails when
      # only `_vcpkg/installed` exists from cache (no vcpkg.exe).
      - name: Cache vcpkg installed tree
        uses: actions/cache@v4
        with:
          path: _vcpkg/installed
          key: vcpkg-installed-${{ runner.os }}-x64-windows-static-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-installed-${{ runner.os }}-x64-windows-static-

      - name: Fetch + bootstrap vcpkg
        shell: cmd
        run: |
          if exist vcpkg\vcpkg.exe (
            echo vcpkg already present
          ) else (
            git clone https://github.com/microsoft/vcpkg.git vcpkg
            cd vcpkg
            call bootstrap-vcpkg.bat
            cd ..
          )

      - name: Install Raylib (static)
        shell: cmd
        run: |
          rem Manifest mode (repo has vcpkg.json). Install declared deps for the static triplet.
          "%GITHUB_WORKSPACE%\vcpkg\vcpkg.exe" install --triplet x64-windows-static --x-manifest-root="%GITHUB_WORKSPACE%" --x-install-root="%GITHUB_WORKSPACE%\_vcpkg\installed"

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_TOOLCHAIN_FILE=%GITHUB_WORKSPACE%\vcpkg\scripts\buildsystems\vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=x64-windows-static ^
            -DKERN_BUILD_GAME=ON ^
            -DKERN_PREFER_STATIC_RAYLIB=ON

      - name: Build kern, kernc, kern-scan, kern_game, kern_contract_humanize
        shell: cmd
        run: cmake --build build --config Release --target kern kernc kern-scan kern_game kern_contract_humanize --parallel 4

      # GitHub windows-latest is headless (no OpenGL window). Skip coverage/g3d runs that init GLFW.
      - name: Smoke tests (.kn)
        shell: cmd
        run: |
          build\Release\kern.exe --scan --registry-only
          build\Release\kern.exe tests\std_v1_builtins_smoke.kn
          build\Release\kern.exe examples\basic\01_hello_world.kn

      - name: Stable suite (contract, bytecode golden, coverage)
        shell: pwsh
        env:
          KERN_COVERAGE_SKIP_GRAPHICS: "1"
        run: pwsh -NoProfile -File ./tests/run_stable.ps1
