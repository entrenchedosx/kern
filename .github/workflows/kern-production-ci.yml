# KERN Production CI - Build optimized release binaries
# Simple, fast CI for production-ready kern binaries

name: Kern Production CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════
  # Windows Build (MSVC, static runtime)
  # ═══════════════════════════════════════════════════════════════════════════════
  windows-release:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Safe]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake (Release)
        if: matrix.build_type == 'Release'
        run: |
          cmake -B build -S . -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DKERN_DISTRIBUTION_STATIC_CRT=ON `
            -DKERN_PREFER_STATIC_RAYLIB=ON `
            -DKERN_ENABLE_LTO=ON

      - name: Configure CMake (Safe)
        if: matrix.build_type == 'Safe'
        run: |
          cmake -B build -S . -A x64 `
            -DCMAKE_BUILD_TYPE=Safe `
            -DKERN_DISTRIBUTION_STATIC_CRT=ON `
            -DKERN_PREFER_STATIC_RAYLIB=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test Binary
        run: |
          build\${{ matrix.build_type }}\kernc.exe --version
          echo "print('Hello, KERN!')" | build\${{ matrix.build_type }}\kernc.exe repl

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kern-windows-x64-${{ matrix.build_type }}
          path: |
            build/${{ matrix.build_type }}/kernc.exe
            build/${{ matrix.build_type }}/kargo.exe

  # ═══════════════════════════════════════════════════════════════════════════════
  # Linux Build (GCC, optimized)
  # ═══════════════════════════════════════════════════════════════════════════════
  linux-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Safe]
        compiler: [gcc, clang]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            sudo apt-get install -y clang
          fi

      - name: Configure CMake
        env:
          CC: ${{ matrix.compiler == 'clang' && 'clang' || 'gcc' }}
          CXX: ${{ matrix.compiler == 'clang' && 'clang++' || 'g++' }}
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DKERN_PREFER_STATIC_RAYLIB=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test Binary
        run: |
          ./build/kernc --version
          echo "print('Hello, KERN!')" | ./build/kernc repl

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kern-linux-x64-${{ matrix.build_type }}-${{ matrix.compiler }}
          path: |
            build/kernc
            build/kargo

  # ═══════════════════════════════════════════════════════════════════════════════
  # macOS Build (Apple Clang)
  # ═══════════════════════════════════════════════════════════════════════════════
  macos-release:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DKERN_PREFER_STATIC_RAYLIB=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test Binary
        run: |
          ./build/kernc --version
          echo "print('Hello, KERN!')" | ./build/kernc repl

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kern-macos-x64-${{ matrix.build_type }}
          path: |
            build/kernc
            build/kargo

  # ═══════════════════════════════════════════════════════════════════════════════
  # Create GitHub Release (on tag)
  # ═══════════════════════════════════════════════════════════════════════════════
  release:
    needs: [windows-release, linux-release, macos-release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: kern-*

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: true
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
