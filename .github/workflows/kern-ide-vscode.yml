name: Kern-IDE (VS Code extension)

on:
  push:
    branches: [main, master]
    paths:
      - "editors/vscode-kern/**"
      - ".github/workflows/kern-ide-vscode.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "editors/vscode-kern/**"
      - ".github/workflows/kern-ide-vscode.yml"

jobs:
  compile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode-kern
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: editors/vscode-kern/package-lock.json
      - run: npm ci
      - run: npm run compile

